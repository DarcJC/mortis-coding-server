# mortis-code-server example configuration.
# Copy to config.toml and edit. Env overrides use the MORTIS_ prefix with `__`
# for nesting, e.g. MORTIS_SERVER__BIND=0.0.0.0:9000.

[server]
# Address to bind. Use 0.0.0.0 to listen on all interfaces.
bind = "127.0.0.1:8080"
# Root directory for materialized repos, sessions, and the binary cache.
data_dir = "./data"
# Optional: force a specific svn executable (otherwise embedded → system).
# svn_bin = "/usr/bin/svn"

[auth]
# Every API/MCP request must send `Authorization: Bearer <token>`.
# Each token maps to a principal; sessions are private to their principal.
tokens = [
  { token = "change-me-please", principal = "alice" },
  # { token = "another-secret", principal = "bob" },
]

[session]
# Idle sessions are reaped after `ttl`; the reaper runs every `reap_interval`.
ttl = "24h"
reap_interval = "10m"

# ---- repositories -----------------------------------------------------------
# One [[repo]] table per repository to serve.

[[repo]]
id = "hello-git"
kind = "git"
url = "https://github.com/octocat/Hello-World.git"
rev = "master"               # branch/tag/commit; omit for the remote default
schedule = "30m"             # 6-field cron OR a human interval like "30m"
include = ["**/*"]           # whitelist globs; empty list = materialize all
exclude = []

